<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حسابي — المعرض الوطني لدجاج الزينة</title>
  <link rel="icon" href="assets/img/exhibition-logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-decor"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/img/exhibition-logo.jpg" onerror="this.onerror=null;this.src=&#39;assets/img/exhibition-logo.jpg&#39;" alt="شعار المعرض" />
        <span class="titles"><b>المعرض الوطني لدجاج الزينة</b><span>نادي البراهما الجزائري — Brahma Club</span></span>
        <img src="assets/img/brahma-logo.jpg" onerror="this.onerror=null;this.src=&#39;assets/img/brahma-logo.jpg&#39;" alt="شعار نادي البراهما" />
      </a>
      <button class="nav-toggle" aria-label="القائمة" data-icon="menu"></button>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="conditions.html">شروط المشاركة</a>
        <span data-auth-slot style="display:contents"></span>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <h1>مرحباً <span id="welcomeName"></span></h1>
      <p>هذه بيانات مشاركتك في المعرض الوطني لدجاج الزينة.</p>
    </div>
  </section>

  <section class="sec">
    <div class="container">
      <div id="loading" class="center"><div class="spinner"></div></div>

      <div id="content" class="hidden">
        <div class="stat-grid">
          <div class="stat"><span class="ic" data-icon="feather"></span><b id="sBirds">0</b><span>عدد الطيور</span></div>
          <div class="stat"><span class="ic" data-icon="package"></span><b id="sCages">0</b><span>عدد الأقفاص</span></div>
          <div class="stat"><span class="ic" data-icon="mappin"></span><b id="sWilaya" style="font-size:1.3rem">—</b><span>الولاية</span></div>
          <div class="stat"><span class="ic" data-icon="home"></span><b id="sBaladya" style="font-size:1.3rem">—</b><span>البلدية</span></div>
        </div>

        <div class="panel">
          <h3><span data-icon="edit"></span> تعديل بياناتي</h3>
          <div class="alert success" id="alert"></div>
          <form id="profileForm">
            <div class="row-2">
              <div class="field"><label>الاسم الكامل</label><input name="fullName" required /></div>
              <div class="field"><label>رقم الهاتف</label><input id="phoneField" disabled /></div>
            </div>
            <div class="field"><label>البريد الإلكتروني</label><input name="email" type="email" /></div>
            <div class="row-2">
              <div class="field"><label>الولاية</label><select name="wilaya" id="wilaya" required></select></div>
              <div class="field"><label>البلدية</label><select name="baladya" id="baladya" required></select></div>
            </div>
            <div class="field">
              <label>السلالات وعدد الطيور والأقفاص</label>
              <div class="breeds-box" id="breedsBox"></div>
              <button type="button" class="add-breed" id="addBreed"><span data-icon="plus"></span> إضافة سلالة أخرى</button>
              <div class="breeds-summary" id="breedsSummary"></div>
            </div>
            <div class="field"><label>ملاحظات</label><textarea name="notes"></textarea></div>
            <button class="btn btn-primary" type="submit" id="saveBtn">حفظ التعديلات</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    if (!Auth.isLoggedIn) location.href = 'login.html';
    if (Auth.role === 'admin') location.href = 'admin.html';

    const $ = (id) => document.getElementById(id);
    const form = $('profileForm');
    const alert = $('alert');
    const summary = $('breedsSummary');
    let editor;

    function updateSummary() {
      if (!editor) return;
      const t = editor.totals();
      summary.textContent = `الإجمالي: ${t.birds} طائر · ${t.cages} قفص`;
    }

    (async function load() {
      try {
        const [{ user }, breeds] = await Promise.all([api('/api/me', { auth: true }), loadBreeds()]);
        $('welcomeName').textContent = user.fullName || '';
        $('sBirds').textContent = user.numBirds;
        $('sCages').textContent = user.numCages;
        $('sWilaya').textContent = user.wilaya;
        $('sBaladya').textContent = user.baladya;
        form.fullName.value = user.fullName || '';
        $('phoneField').value = user.phone || '';
        form.email.value = user.email || '';
        form.notes.value = user.notes || '';
        fillWilayas($('wilaya'), $('baladya'), user.wilaya, user.baladya);
        editor = makeBreedEditor({
          container: $('breedsBox'), addBtn: $('addBreed'), breeds,
          entries: user.entries && user.entries.length ? user.entries : [{ breed: user.breed || '', birds: user.numBirds, cages: user.numCages }],
        });
        $('breedsBox').addEventListener('input', updateSummary);
        $('addBreed').addEventListener('click', () => setTimeout(updateSummary, 0));
        updateSummary();
        $('loading').classList.add('hidden');
        $('content').classList.remove('hidden');
      } catch (e) {
        if (String(e.message).includes('الجلسة') || String(e.message).includes('الدخول')) Auth.logout();
        $('loading').innerHTML = '<p style="color:var(--danger)">' + e.message + '</p>';
      }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('saveBtn');
      const body = Object.fromEntries(new FormData(form));
      body.entries = editor.entries;
      if (body.entries.length === 0) {
        alert.className = 'alert error show'; alert.textContent = 'يرجى إضافة سلالة واحدة على الأقل.'; return;
      }
      btn.disabled = true; btn.textContent = 'جارٍ الحفظ...';
      alert.classList.remove('show');
      try {
        const { user } = await api('/api/me', { method: 'PUT', auth: true, body });
        $('sBirds').textContent = user.numBirds;
        $('sCages').textContent = user.numCages;
        $('sWilaya').textContent = user.wilaya;
        $('sBaladya').textContent = user.baladya;
        alert.className = 'alert success show';
        alert.textContent = 'تم حفظ التعديلات بنجاح.';
      } catch (err) {
        alert.className = 'alert error show';
        alert.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = 'حفظ التعديلات';
      }
    });
  </script>
</body>
</html>
