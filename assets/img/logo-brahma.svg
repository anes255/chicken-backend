<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="نادي البراهما الجزائري - Algerian Brahma Club - ABC">
  <defs>
    <linearGradient id="bring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f9e54"/><stop offset=".5" stop-color="#1d1d1d"/><stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="wheat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6dc97"/><stop offset="1" stop-color="#c79a44"/>
    </linearGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="160" cy="160" r="156" fill="#111"/>
  <circle cx="160" cy="160" r="150" fill="url(#bring)"/>
  <circle cx="160" cy="160" r="126" fill="#f3f3f0"/>
  <!-- green accent arc upper-left -->
  <path d="M160 10 A150 150 0 0 0 40 90" fill="none" stroke="#2f9e54" stroke-width="14" stroke-linecap="round"/>
  <path d="M160 10 A150 150 0 0 0 40 90" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".5"/>

  <!-- crescent + star top -->
  <g transform="translate(160,30)" fill="#d21034">
    <path d="M7 0a11 11 0 1 0 0 22 8.5 8.5 0 1 1 0-22z"/>
    <path d="M19 6l2 4.4 4.8.5-3.6 3.2 1 4.6-4.2-2.4-4.2 2.4 1-4.6-3.6-3.2 4.8-.5z"/>
  </g>

  <!-- top arc text -->
  <path id="bTop" d="M52,168 A108,108 0 0 1 268,168" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="800" fill="#1d1d1d" font-size="20" letter-spacing="1.5">
    <textPath href="#bTop" startOffset="50%" text-anchor="middle">Algerian  Brahma  Club</textPath>
  </text>

  <!-- ===== two brahma chickens facing each other ===== -->
  <!-- left bird -->
  <g transform="translate(132,150)">
    <path d="M8 -34 c-10 -2 -18 6 -18 16 c-12 2 -20 12 -18 24 c-12 4 -16 16 -10 26 c4 8 14 12 22 10 c2 8 10 12 18 10 c2 6 8 8 12 4 l4 -10 c8 -2 12 -10 10 -18 c6 -4 8 -12 4 -18 c2 -8 -2 -16 -10 -18 c0 -10 -8 -18 -18 -18 z" fill="#2a2a2a"/>
    <circle cx="-6" cy="-22" r="2.4" fill="#fff"/>
    <path d="M-14 -24 l-8 0 M-14 -18 l-8 2" stroke="#2a2a2a" stroke-width="2"/>
    <!-- feather streaks (white) -->
    <path d="M2 -10 q10 4 16 14 M-2 2 q12 2 18 12 M-8 14 q12 0 18 8" stroke="#f3f3f0" stroke-width="2.4" fill="none" opacity=".8"/>
    <!-- feathered legs -->
    <path d="M2 40 q-4 12 -2 22 M16 40 q2 12 6 20" stroke="#2a2a2a" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- right bird (mirrored) -->
  <g transform="translate(188,150) scale(-1,1)">
    <path d="M8 -34 c-10 -2 -18 6 -18 16 c-12 2 -20 12 -18 24 c-12 4 -16 16 -10 26 c4 8 14 12 22 10 c2 8 10 12 18 10 c2 6 8 8 12 4 l4 -10 c8 -2 12 -10 10 -18 c6 -4 8 -12 4 -18 c2 -8 -2 -16 -10 -18 c0 -10 -8 -18 -18 -18 z" fill="#2a2a2a"/>
    <circle cx="-6" cy="-22" r="2.4" fill="#fff"/>
    <path d="M-14 -24 l-8 0 M-14 -18 l-8 2" stroke="#2a2a2a" stroke-width="2"/>
    <path d="M2 -10 q10 4 16 14 M-2 2 q12 2 18 12 M-8 14 q12 0 18 8" stroke="#f3f3f0" stroke-width="2.4" fill="none" opacity=".8"/>
    <path d="M2 40 q-4 12 -2 22 M16 40 q2 12 6 20" stroke="#2a2a2a" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- wheat laurels -->
  <g fill="url(#wheat)">
    <g transform="translate(86,150)">
      <path d="M0 -44 C-16 -30 -20 0 -8 40" fill="none" stroke="url(#wheat)" stroke-width="4"/>
      <g>
        <path d="M-6 -34 q-12 -2 -16 -12 q12 0 16 12z"/><path d="M-9 -22 q-12 -2 -16 -12 q12 0 16 12z"/>
        <path d="M-11 -10 q-13 -1 -17 -11 q12 0 17 11z"/><path d="M-11 4 q-13 0 -18 -9 q13 -1 18 9z"/>
        <path d="M-9 18 q-13 1 -19 -7 q13 -2 19 7z"/><path d="M-5 31 q-12 3 -19 -4 q12 -4 19 4z"/>
      </g>
    </g>
    <g transform="translate(234,150) scale(-1,1)">
      <path d="M0 -44 C-16 -30 -20 0 -8 40" fill="none" stroke="url(#wheat)" stroke-width="4"/>
      <g>
        <path d="M-6 -34 q-12 -2 -16 -12 q12 0 16 12z"/><path d="M-9 -22 q-12 -2 -16 -12 q12 0 16 12z"/>
        <path d="M-11 -10 q-13 -1 -17 -11 q12 0 17 11z"/><path d="M-11 4 q-13 0 -18 -9 q13 -1 18 9z"/>
        <path d="M-9 18 q-13 1 -19 -7 q13 -2 19 7z"/><path d="M-5 31 q-12 3 -19 -4 q12 -4 19 4z"/>
      </g>
    </g>
  </g>

  <!-- green ribbon -->
  <g transform="translate(160,212)">
    <path d="M-86 0 l14 -9 v7 h144 v-7 l14 9 -14 9 v-7 H-72 v7 Z" fill="#0f5e2c"/>
    <rect x="-72" y="-8" width="144" height="18" fill="#2f9e54"/>
    <text x="0" y="5" text-anchor="middle" font-family="Tahoma, sans-serif" font-weight="700" fill="#fff" font-size="13">نادي البراهما الجزائري</text>
  </g>

  <!-- ABC -->
  <text x="160" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" fill="#1d1d1d" font-size="34" letter-spacing="3">ABC</text>
</svg>
