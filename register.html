<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="assets/img/exhibition-logo.jpg" />
  <!-- Social share preview (Open Graph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="نادي البراهما الجزائري — Brahma Club" />

  <meta property="og:description" content="المنصة الرقمية الرسمية للمشاركة في المعرض الوطني لدجاج الزينة، من تنظيم نادي البراهما الجزائري. سجّل بياناتك وعدد طيورك وأقفاصك." />
  <meta property="og:url" content="https://chicken1-one.vercel.app/" />
  <meta property="og:image" content="https://chicken1-one.vercel.app/assets/img/brahma-logo.jpg" />
  <meta property="og:image:secure_url" content="https://chicken1-one.vercel.app/assets/img/brahma-logo.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="715" />
  <meta property="og:image:height" content="715" />
  <meta property="og:image:alt" content="شعار نادي البراهما الجزائري — منظّم المعرض" />
  <meta property="og:locale" content="ar_DZ" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="المعرض الوطني لدجاج الزينة بالجزائر 2026" />
  <meta name="twitter:description" content="المنصة الرقمية الرسمية للمشاركة في المعرض الوطني لدجاج الزينة، من تنظيم نادي البراهما الجزائري. سجّل بياناتك وعدد طيورك وأقفاصك." />
  <meta name="twitter:image" content="https://chicken1-one.vercel.app/assets/img/brahma-logo.jpg" />
  <meta name="theme-color" content="#15793a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-decor"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/">
        <img loading="lazy" decoding="async" src="assets/img/exhibition-logo.jpg" onerror="this.onerror=null;this.src=&#39;assets/img/exhibition-logo.jpg&#39;" alt="شعار المعرض" />
        <span class="titles"><b>المعرض الوطني لدجاج الزينة</b><span>نادي البراهما الجزائري — Brahma Club</span></span>
        <img loading="lazy" decoding="async" src="assets/img/brahma-logo.jpg" onerror="this.onerror=null;this.src=&#39;assets/img/brahma-logo.jpg&#39;" alt="شعار نادي البراهما" />
      </a>
      <button class="nav-toggle" aria-label="القائمة" data-icon="menu"></button>
      <nav class="nav-links">
        <a href="/">الرئيسية</a>
        <a href="/#goals">الأهداف</a>
        <a href="conditions">شروط المشاركة</a>
        <a href="register">التسجيل</a>
        <span data-auth-slot style="display:contents"></span>
      </nav>
    </div>
  </header>

  <section class="sec">
    <div class="container">
      <div class="form-wrap wide">
        <div class="form-head">
          <img loading="lazy" decoding="async" src="assets/img/exhibition-logo.jpg" onerror="this.onerror=null;this.src=&#39;assets/img/exhibition-logo.jpg&#39;" alt="شعار المعرض" />
          <h2>التسجيل في المعرض</h2>
          <p>أدخل بياناتك وعدد الطيور والأقفاص للمشاركة في المعرض الوطني لدجاج الزينة.</p>
        </div>

        <div class="alert error" id="alert"></div>

        <form id="regForm">
          <div class="row-2">
            <div class="field">
              <label>الاسم الكامل *</label>
              <input name="fullName" required placeholder="مثال: محمد الأمين" />
            </div>
            <div class="field">
              <label>رقم الهاتف *</label>
              <input name="phone" required inputmode="tel" placeholder="06xx / 05xx / 07xx" />
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>البريد الإلكتروني (اختياري)</label>
              <input name="email" type="email" placeholder="email@example.com" />
            </div>
            <div class="field">
              <label>كلمة المرور *</label>
              <input name="password" type="password" required minlength="6" placeholder="6 أحرف على الأقل" />
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>الولاية *</label>
              <select name="wilaya" id="wilaya" required></select>
            </div>
            <div class="field">
              <label>البلدية *</label>
              <select name="baladya" id="baladya" required></select>
            </div>
          </div>

          <div class="field">
            <label>السلالات وعدد الطيور والأقفاص *</label>
            <p style="font-size:.82rem;color:var(--muted);margin:-2px 0 8px">أضف كل سلالة على حدة مع عدد طيورها وأقفاصها الخاص بها.</p>
            <div class="breeds-box" id="breedsBox"></div>
            <button type="button" class="add-breed" id="addBreed"><span data-icon="plus"></span> إضافة سلالة أخرى</button>
            <div class="breeds-summary" id="breedsSummary"></div>
          </div>

          <div class="field">
            <label>ملاحظات (اختياري)</label>
            <textarea name="notes" placeholder="أي معلومات إضافية تخص مشاركتك..."></textarea>
          </div>

          <label style="display:flex;gap:8px;align-items:flex-start;font-size:.9rem;color:var(--muted);margin:6px 0 16px">
            <input type="checkbox" id="agree" required style="width:auto;margin-top:5px" />
            <span>أقرّ بأنني اطّلعت على <a href="conditions" target="_blank" style="color:var(--green-600);font-weight:700">شروط المشاركة</a> وأوافق عليها، وأتحمّل مسؤولية صحة المعلومات المقدَّمة.</span>
          </label>

          <button class="btn btn-primary btn-block" type="submit" id="submitBtn">تسجيل المشاركة</button>
          <p class="form-foot">لديك حساب بالفعل؟ <a href="login">سجّل الدخول</a></p>
        </form>
      </div>
    </div>
  </section>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    if (Auth.isLoggedIn) location.href = Auth.role === 'admin' ? 'admin' : 'dashboard';
    fillWilayas(document.getElementById('wilaya'), document.getElementById('baladya'));

    const alert = document.getElementById('alert');
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');
    const summary = document.getElementById('breedsSummary');
    let editor;

    (async function () {
      const breeds = await loadBreeds();
      editor = makeBreedEditor({
        container: document.getElementById('breedsBox'),
        addBtn: document.getElementById('addBreed'),
        breeds,
      });
      document.getElementById('breedsBox').addEventListener('input', updateSummary);
      document.getElementById('addBreed').addEventListener('click', () => setTimeout(updateSummary, 0));
      updateSummary();
    })();

    function updateSummary() {
      if (!editor) return;
      const t = editor.totals();
      summary.textContent = `الإجمالي: ${t.birds} طائر · ${t.cages} قفص`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.classList.remove('show');
      const data = Object.fromEntries(new FormData(form));
      data.entries = editor.entries;
      if (data.entries.length === 0) {
        alert.textContent = 'يرجى إضافة سلالة واحدة على الأقل من القائمة.';
        alert.classList.add('show'); return;
      }
      if (!document.getElementById('agree').checked) {
        alert.textContent = 'يجب الموافقة على شروط المشاركة.';
        alert.classList.add('show'); return;
      }
      btn.disabled = true; btn.textContent = 'جارٍ التسجيل...';
      try {
        const res = await api('/api/register', { method: 'POST', body: data });
        Auth.save(res);
        location.href = 'dashboard';
      } catch (err) {
        alert.textContent = err.message;
        alert.classList.add('show');
        btn.disabled = false; btn.textContent = 'تسجيل المشاركة';
      }
    });
  </script>
</body>
</html>
