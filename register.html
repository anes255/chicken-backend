<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التسجيل في المعرض — دجاج الزينة</title>
  <link rel="icon" href="assets/img/logo-maaradh.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-decor"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/img/logo-maaradh.png" onerror="this.onerror=null;this.src=&#39;assets/img/logo-maaradh.svg&#39;" alt="شعار المعرض" />
        <span class="titles"><b>المعرض الوطني لدجاج الزينة</b><span>نادي البراهما الجزائري — Brahma Club</span></span>
      </a>
      <button class="nav-toggle" aria-label="القائمة">☰</button>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="index.html#goals">الأهداف</a>
        <a href="conditions.html">شروط المشاركة</a>
        <a href="register.html">التسجيل</a>
        <span data-auth-slot style="display:contents"></span>
      </nav>
    </div>
  </header>

  <section class="sec">
    <div class="container">
      <div class="form-wrap wide">
        <div class="form-head">
          <img src="assets/img/logo-maaradh.png" onerror="this.onerror=null;this.src=&#39;assets/img/logo-maaradh.svg&#39;" alt="شعار المعرض" />
          <h2>التسجيل في المعرض</h2>
          <p>أدخل بياناتك وعدد الطيور والأقفاص للمشاركة في المعرض الوطني لدجاج الزينة.</p>
        </div>

        <div class="alert error" id="alert"></div>

        <form id="regForm">
          <div class="row-2">
            <div class="field">
              <label>الاسم الكامل *</label>
              <input name="fullName" required placeholder="مثال: محمد الأمين" />
            </div>
            <div class="field">
              <label>رقم الهاتف *</label>
              <input name="phone" required inputmode="tel" placeholder="06xx / 05xx / 07xx" />
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>البريد الإلكتروني (اختياري)</label>
              <input name="email" type="email" placeholder="email@example.com" />
            </div>
            <div class="field">
              <label>كلمة المرور *</label>
              <input name="password" type="password" required minlength="6" placeholder="6 أحرف على الأقل" />
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>الولاية *</label>
              <select name="wilaya" id="wilaya" required></select>
            </div>
            <div class="field">
              <label>البلدية *</label>
              <select name="baladya" id="baladya" required></select>
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label>عدد الطيور *</label>
              <input name="numBirds" type="number" min="0" required value="0" />
            </div>
            <div class="field">
              <label>عدد الأقفاص *</label>
              <input name="numCages" type="number" min="0" required value="0" />
            </div>
          </div>

          <div class="field">
            <label>سلالة / نوع الطيور (اختياري)</label>
            <input name="breed" placeholder="مثال: براهما، سيبرايت، باندا..." />
          </div>

          <div class="field">
            <label>ملاحظات (اختياري)</label>
            <textarea name="notes" placeholder="أي معلومات إضافية تخص مشاركتك..."></textarea>
          </div>

          <label style="display:flex;gap:8px;align-items:flex-start;font-size:.9rem;color:var(--muted);margin:6px 0 16px">
            <input type="checkbox" id="agree" required style="width:auto;margin-top:5px" />
            <span>أقرّ بأنني اطّلعت على <a href="conditions.html" target="_blank" style="color:var(--green-600);font-weight:700">شروط المشاركة</a> وأوافق عليها، وأتحمّل مسؤولية صحة المعلومات المقدَّمة.</span>
          </label>

          <button class="btn btn-primary btn-block" type="submit" id="submitBtn">تسجيل المشاركة</button>
          <p class="form-foot">لديك حساب بالفعل؟ <a href="login.html">سجّل الدخول</a></p>
        </form>
      </div>
    </div>
  </section>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    if (Auth.isLoggedIn) location.href = Auth.role === 'admin' ? 'admin.html' : 'dashboard.html';
    fillWilayas(document.getElementById('wilaya'), document.getElementById('baladya'));

    const alert = document.getElementById('alert');
    const form = document.getElementById('regForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.classList.remove('show');
      const data = Object.fromEntries(new FormData(form));
      if (!document.getElementById('agree').checked) {
        alert.textContent = 'يجب الموافقة على شروط المشاركة.';
        alert.classList.add('show'); return;
      }
      btn.disabled = true; btn.textContent = 'جارٍ التسجيل...';
      try {
        const res = await api('/api/register', { method: 'POST', body: data });
        Auth.save(res);
        location.href = 'dashboard.html';
      } catch (err) {
        alert.textContent = err.message;
        alert.classList.add('show');
        btn.disabled = false; btn.textContent = 'تسجيل المشاركة';
      }
    });
  </script>
</body>
</html>
