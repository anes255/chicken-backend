<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب — المعرض الوطني لدجاج الزينة 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/expo-logo.png">
</head>
<body>
  <header id="site-header"></header>

  <div class="auth-wrap">
    <div class="panel">
      <h2 style="text-align:center;color:var(--green-dark);margin-top:0">إنشاء حساب جديد</h2>
      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="ok"></div>
      <form id="form">
        <div class="field">
          <label>الاسم الكامل</label>
          <input name="full_name" required placeholder="الاسم واللقب">
        </div>
        <div class="field">
          <label>رقم الهاتف (يُستخدم لتسجيل الدخول)</label>
          <input name="phone" required placeholder="0xxxxxxxxx" inputmode="numeric">
        </div>
        <div class="field">
          <label>البريد الإلكتروني (اختياري)</label>
          <input name="email" type="email" placeholder="example@mail.com">
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input name="password" type="password" required minlength="6" placeholder="6 أحرف على الأقل">
        </div>
        <button class="btn btn-primary btn-block" type="submit">إنشاء الحساب</button>
      </form>
      <p class="form-note">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </div>
  </div>

  <footer id="site-footer"></footer>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const err = document.getElementById('err'), ok = document.getElementById('ok');
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show'); ok.classList.remove('show');
      const f = e.target;
      const body = {
        full_name: f.full_name.value.trim(),
        phone: f.phone.value.trim(),
        email: f.email.value.trim(),
        password: f.password.value,
      };
      try {
        const data = await api('/api/auth/register', { method: 'POST', body });
        Auth.set(data);
        ok.textContent = 'تم إنشاء الحساب بنجاح، يتم تحويلك...'; ok.classList.add('show');
        setTimeout(() => location.href = 'dashboard.html', 700);
      } catch (e2) { err.textContent = e2.message; err.classList.add('show'); }
    });
  </script>
</body>
</html>
