<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — المعرض الوطني لدجاج الزينة 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/expo-logo.png">
</head>
<body>
  <header id="site-header"></header>

  <div class="auth-wrap">
    <div class="panel">
      <h2 style="text-align:center;color:var(--green-dark);margin-top:0">تسجيل الدخول</h2>
      <div class="alert alert-error" id="err"></div>
      <form id="form">
        <div class="field">
          <label>رقم الهاتف</label>
          <input name="phone" required placeholder="0xxxxxxxxx" inputmode="numeric">
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input name="password" type="password" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">دخول</button>
      </form>
      <p class="form-note">ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a></p>
    </div>
  </div>

  <footer id="site-footer"></footer>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const err = document.getElementById('err');
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      const f = e.target;
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: { phone: f.phone.value.trim(), password: f.password.value },
        });
        Auth.set(data);
        location.href = data.user.is_admin ? 'admin.html' : 'dashboard.html';
      } catch (e2) { err.textContent = e2.message; err.classList.add('show'); }
    });
  </script>
</body>
</html>
